<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICO Purchases - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .admin-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2), rgba(46, 125, 50, 0.2));
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .purchases-table {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 215, 0, 0.1);
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }

        .table-header h2 {
            margin: 0;
            color: #FFD700;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .purchase-item {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 15px;
            align-items: center;
            transition: background 0.3s;
        }

        .purchase-item:hover {
            background: rgba(255, 215, 0, 0.05);
        }

        .purchase-item:last-child {
            border-bottom: none;
        }

        .purchase-detail {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.1rem;
            color: #fff;
            font-weight: 500;
        }

        .amount-value {
            color: #4CAF50;
            font-weight: bold;
        }

        .tokens-value {
            color: #FFD700;
            font-weight: bold;
        }

        .no-purchases {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #FFD700;
            font-size: 1.2rem;
        }

        .error-message {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.5);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            color: #fff;
        }

        @media (max-width: 768px) {
            .purchase-item {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>💰 ICO Purchases Dashboard</h1>
            <p style="color: rgba(255,255,255,0.7);">Real-time view of KENO token sales</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalPurchases">0</div>
                <div class="stat-label">Total Purchases</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalRevenue">$0</div>
                <div class="stat-label">Total Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalTokens">0</div>
                <div class="stat-label">KENO Sold</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayPurchases">0</div>
                <div class="stat-label">Today's Purchases</div>
            </div>
        </div>

        <div class="purchases-table">
            <div class="table-header">
                <h2>Recent Purchases</h2>
                <button class="refresh-btn" onclick="loadPurchases()">🔄 Refresh</button>
            </div>
            <div id="purchasesList">
                <div class="loading">Loading purchases...</div>
            </div>
        </div>
    </div>

    <script>
        async function loadPurchases() {
            try {
                const response = await fetch('/api/ico/purchases');
                
                if (!response.ok) {
                    throw new Error('Failed to load purchases');
                }

                const data = await response.json();
                displayPurchases(data.purchases || []);
                updateStats(data.purchases || []);
            } catch (error) {
                console.error('Error loading purchases:', error);
                document.getElementById('purchasesList').innerHTML = `
                    <div class="error-message">
                        ❌ Error loading purchases. Please refresh the page.
                    </div>
                `;
            }
        }

        function displayPurchases(purchases) {
            const listDiv = document.getElementById('purchasesList');
            
            if (purchases.length === 0) {
                listDiv.innerHTML = `
                    <div class="no-purchases">
                        No purchases yet. Share your ICO link to start selling! 🚀
                    </div>
                `;
                return;
            }

            listDiv.innerHTML = purchases.map(purchase => `
                <div class="purchase-item">
                    <div class="purchase-detail">
                        <div class="detail-label">Date & Time</div>
                        <div class="detail-value">${formatDate(purchase.timestamp)}</div>
                    </div>
                    <div class="purchase-detail">
                        <div class="detail-label">Amount Paid</div>
                        <div class="detail-value amount-value">$${purchase.amount}</div>
                    </div>
                    <div class="purchase-detail">
                        <div class="detail-label">KENO Tokens</div>
                        <div class="detail-value tokens-value">${purchase.tokens.toLocaleString()} KENO</div>
                    </div>
                    <div class="purchase-detail">
                        <div class="detail-label">Wallet Address</div>
                        <div class="detail-value" style="font-size: 0.85rem; font-family: monospace;">
                            ${purchase.walletAddress ? purchase.walletAddress.slice(0, 8) + '...' + purchase.walletAddress.slice(-6) : 'N/A'}
                        </div>
                    </div>
                    <div class="purchase-detail">
                        <div class="detail-label">Status</div>
                        <div class="detail-value">
                            ${purchase.tokensSent 
                                ? '<span style="color: #4CAF50;">✅ Sent</span>' 
                                : '<span style="color: #FF9800;">⏳ Pending</span>'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateStats(purchases) {
            const totalPurchases = purchases.length;
            const totalRevenue = purchases.reduce((sum, p) => sum + parseFloat(p.amount), 0);
            const totalTokens = purchases.reduce((sum, p) => sum + p.tokens, 0);
            
            // Calculate today's purchases
            const today = new Date().toDateString();
            const todayPurchases = purchases.filter(p => {
                const purchaseDate = new Date(p.timestamp).toDateString();
                return purchaseDate === today;
            }).length;

            document.getElementById('totalPurchases').textContent = totalPurchases;
            document.getElementById('totalRevenue').textContent = `$${totalRevenue.toLocaleString()}`;
            document.getElementById('totalTokens').textContent = totalTokens.toLocaleString();
            document.getElementById('todayPurchases').textContent = todayPurchases;
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Load purchases on page load
        loadPurchases();

        // Auto-refresh every 30 seconds
        setInterval(loadPurchases, 30000);
    </script>
</body>
</html>
