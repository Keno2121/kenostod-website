<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grant Management | Kenostod Academy</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-gray: #64748b;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .admin-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 24px 40px;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 100;
        }

        .admin-header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 4px; }
        .admin-header p { opacity: 0.9; font-size: 0.95rem; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px; }

        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            align-items: center; justify-content: center;
            z-index: 2000;
            display: flex;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .login-card h2 { margin-bottom: 24px; color: var(--primary); font-weight: 800; }

        .login-card input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .login-card input:focus { outline: none; border-color: var(--primary); }

        .login-card button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .login-card button:hover { background: var(--primary-dark); }

        .login-card .error {
            color: var(--danger);
            background: #fee2e2;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }

        .grant-card {
            background: var(--card);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
        }

        .grant-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

        .status-badge {
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pending { background: #fef3c7; color: #92400e; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-approve { background: var(--success); color: white; }
        .btn-reject { background: var(--danger); color: white; }
        .btn-refresh { background: var(--text-gray); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin: 24px 0;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .detail-item strong {
            display: block;
            color: var(--text-gray);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .detail-item span { font-weight: 600; color: var(--text); }

        .grant-content { margin-top: 24px; }
        .grant-content h4 { font-size: 0.9rem; color: var(--text-gray); margin-bottom: 8px; text-transform: uppercase; }
        .grant-content p {
            background: white;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            color: #475569;
            white-space: pre-wrap;
        }

        @media (max-width: 768px) {
            .container { padding: 20px; }
            .admin-header { padding: 20px; }
            .admin-header h1 { font-size: 1.4rem; }
            .grant-card { padding: 20px; }
            .details { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-card">
            <div style="font-size: 48px; margin-bottom: 16px;">💎</div>
            <h2>Admin Grant Panel</h2>
            <div id="login-error" class="error">Invalid password</div>
            <input type="password" id="admin-pass" placeholder="Enter Admin Password" onkeydown="if(event.key==='Enter') login()">
            <button onclick="login()">Access Dashboard</button>
        </div>
    </div>

    <div class="admin-header">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>💎 Mining Grant Management</h1>
                <p>Review and approve KENO mining grant applications</p>
            </div>
            <button class="btn btn-refresh" onclick="loadGrants()">🔄 Refresh</button>
        </div>
    </div>

    <div class="container">
        <div id="grants-list">
            <div style="text-align: center; padding: 40px; color: #64748b;">
                <p>Loading...</p>
            </div>
        </div>
    </div>

    <script>
        var adminPwd = sessionStorage.getItem('adminPwd') || '';

        function showLogin() {
            document.getElementById('login-overlay').style.display = 'flex';
        }

        function hideLogin() {
            document.getElementById('login-overlay').style.display = 'none';
        }

        async function login() {
            var passInput = document.getElementById('admin-pass');
            var errorDiv = document.getElementById('login-error');
            var pass = passInput.value.trim();
            
            if (!pass) return;

            try {
                var res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass })
                });

                if (res.ok) {
                    adminPwd = pass;
                    sessionStorage.setItem('adminPwd', pass);
                    hideLogin();
                    loadGrants();
                } else {
                    errorDiv.textContent = 'Invalid password';
                    errorDiv.style.display = 'block';
                    passInput.value = '';
                }
            } catch (err) {
                errorDiv.textContent = 'Server error. Please try again.';
                errorDiv.style.display = 'block';
            }
        }

        async function loadGrants() {
            if (!adminPwd) {
                showLogin();
                return;
            }

            var list = document.getElementById('grants-list');
            list.innerHTML = '<div style="text-align:center; padding:40px;">Loading applications...</div>';

            try {
                var res = await fetch('/api/admin/grants', {
                    headers: { 'x-admin-password': adminPwd }
                });

                if (res.status === 401) {
                    sessionStorage.removeItem('adminPwd');
                    adminPwd = '';
                    showLogin();
                    list.innerHTML = '<div style="text-align:center; padding:40px; color:#64748b;">Please login to view applications...</div>';
                    return;
                }

                if (!res.ok) throw new Error('Server error: ' + res.status);

                var grants = await res.json();
                hideLogin();
                
                if (grants.length === 0) {
                    list.innerHTML = '<div style="text-align:center; padding:40px; background:white; border-radius:16px; box-shadow:var(--shadow-md);">No applications yet.</div>';
                    return;
                }

                list.innerHTML = '';
                grants.slice().reverse().forEach(function(grant) {
                    var card = document.createElement('div');
                    card.className = 'grant-card';
                    
                    var buttonsHtml = '';
                    if (grant.status === 'pending') {
                        buttonsHtml = '<button class="btn btn-approve" onclick="updateStatus(\'' + grant.id + '\', \'approved\')">Approve</button> ' +
                                      '<button class="btn btn-reject" onclick="updateStatus(\'' + grant.id + '\', \'rejected\')">Reject</button>';
                    }
                    
                    card.innerHTML = '<div style="display:flex; justify-content:space-between; align-items:start; flex-wrap:wrap; gap:16px;">' +
                        '<div>' +
                            '<span class="status-badge status-' + grant.status + '">' + grant.status + '</span>' +
                            '<h3 style="margin:12px 0; font-size:1.2rem; color:var(--primary); word-break:break-all;">' + grant.walletAddress + '</h3>' +
                        '</div>' +
                        '<div style="display:flex; gap:12px;">' + buttonsHtml + '</div>' +
                    '</div>' +
                    '<div class="details">' +
                        '<div class="detail-item"><strong>Courses Completed</strong><span>' + grant.coursesCompleted + ' Courses</span></div>' +
                        '<div class="detail-item"><strong>Experience</strong><span>' + grant.experience + '</span></div>' +
                        '<div class="detail-item"><strong>Application Date</strong><span>' + new Date(grant.appliedAt).toLocaleString() + '</span></div>' +
                        '<div class="detail-item"><strong>Grant ID</strong><span style="font-family:monospace; font-size:0.8rem;">' + grant.id + '</span></div>' +
                    '</div>' +
                    '<div class="grant-content">' +
                        '<h4>Why interested in mining?</h4>' +
                        '<p>' + (grant.interest || 'No response provided.') + '</p>' +
                    '</div>' +
                    '<div class="grant-content" style="margin-top:20px;">' +
                        '<h4>Goals in blockchain space?</h4>' +
                        '<p>' + (grant.goals || 'No response provided.') + '</p>' +
                    '</div>';
                    
                    list.appendChild(card);
                });
            } catch (err) {
                list.innerHTML = '<div style="text-align:center; padding:40px; color:var(--danger);">Error: ' + err.message + '</div>';
            }
        }

        async function updateStatus(grantId, status) {
            if (!confirm('Are you sure you want to ' + status + ' this application?')) return;
            
            try {
                var res = await fetch('/api/admin/grants/update', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-admin-password': adminPwd
                    },
                    body: JSON.stringify({ grantId: grantId, status: status })
                });

                if (res.ok) {
                    loadGrants();
                } else if (res.status === 401) {
                    alert('Session expired. Please log in again.');
                    sessionStorage.removeItem('adminPwd');
                    showLogin();
                } else {
                    alert('Update failed.');
                }
            } catch (err) {
                alert('Connection error.');
            }
        }

        loadGrants();
    </script>
</body>
</html>
