<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backoffice - Course Curriculum Viewer | Kenostod Academy</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Login Overlay Styles */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-xl);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 24px;
            color: var(--primary-blue);
        }

        .login-card input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 1rem;
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        .login-card .error {
            color: #ef4444;
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }

        :root {
            --primary-blue: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #60a5fa;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --bg-light: #f8fafc;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f1f5f9;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .admin-header {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-dark));
            color: white;
            padding: 24px 40px;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 100;
        }

        .admin-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .admin-header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 96px;
            width: 320px;
            height: calc(100vh - 96px);
            background: white;
            border-right: 1px solid #e5e7eb;
            overflow-y: auto;
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .sidebar h3 {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding: 0 12px;
        }

        .course-nav {
            list-style: none;
        }

        .course-nav li {
            margin-bottom: 4px;
        }

        .course-nav button {
            width: 100%;
            text-align: left;
            padding: 12px 16px;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .course-nav button:hover {
            background: #f3f4f6;
            color: var(--primary-blue);
        }

        .course-nav button.active {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-dark));
            color: white;
        }

        .course-nav button .icon {
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .financial-literacy {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 2px solid #fef3c7;
        }

        .financial-literacy button {
            background: linear-gradient(135deg, #fff7ed, #fef3c7);
            border: 1px solid var(--accent-orange);
        }

        .financial-literacy button.active {
            background: linear-gradient(135deg, var(--accent-orange), #d97706);
        }

        .main-content {
            margin-left: 360px;
            background: white;
            border-radius: 16px;
            padding: 48px;
            box-shadow: var(--shadow-md);
            min-height: calc(100vh - 176px);
        }

        .course-header-section {
            border-bottom: 3px solid var(--primary-blue);
            padding-bottom: 24px;
            margin-bottom: 32px;
        }

        .course-header-section h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary-blue);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .course-header-section .icon {
            font-size: 2.5rem;
        }

        .course-meta {
            display: flex;
            gap: 24px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f0f9ff;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-blue);
        }

        .section-block {
            margin-bottom: 40px;
        }

        .section-block h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-block h4 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin-top: 24px;
            margin-bottom: 12px;
        }

        .section-block p {
            line-height: 1.8;
            color: var(--text-gray);
            margin-bottom: 16px;
        }

        .section-block ul, .section-block ol {
            margin-left: 24px;
            margin-bottom: 16px;
        }

        .section-block li {
            line-height: 1.8;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .highlight-box {
            background: linear-gradient(135deg, #fef3c7, #fef3c7);
            border-left: 4px solid var(--accent-orange);
            padding: 20px;
            border-radius: 8px;
            margin: 24px 0;
        }

        .highlight-box strong {
            color: #d97706;
            display: block;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .course-completion-section {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 3px solid #e5e7eb;
            text-align: center;
        }

        .completion-button {
            background: linear-gradient(135deg, var(--accent-green), #059669);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            display: inline-block;
        }

        .completion-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
        }

        .completion-button:active {
            transform: translateY(0);
        }

        .info-box {
            background: #f0f9ff;
            border-left: 4px solid var(--primary-blue);
            padding: 20px;
            border-radius: 8px;
            margin: 24px 0;
        }

        .info-box strong {
            color: var(--primary-blue);
            display: block;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
            margin: 24px 0;
        }

        .skill-card {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-dark));
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .module-list {
            counter-reset: module;
        }

        .module-item {
            background: #f9fafb;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            border: 2px solid #e5e7eb;
        }

        .module-item::before {
            counter-increment: module;
            content: "Module " counter(module);
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .quiz-question {
            background: #fef3c7;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 16px;
            border: 2px solid var(--accent-orange);
        }

        .quiz-question strong {
            display: block;
            color: #d97706;
            margin-bottom: 12px;
            font-size: 1.05rem;
        }

        .quiz-question ul {
            list-style: none;
            margin-left: 0;
        }

        .quiz-question li {
            padding: 8px 12px;
            background: white;
            margin-bottom: 6px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quiz-question li:hover {
            background: #fff7ed;
            transform: translateX(4px);
        }

        .quiz-question li.selected-correct {
            background: #d1fae5;
            border: 2px solid var(--accent-green);
        }

        .quiz-question li.selected-wrong {
            background: #fee2e2;
            border: 2px solid #ef4444;
        }

        .quiz-question li.reveal-correct {
            background: #d1fae5;
            border: 2px solid var(--accent-green);
        }

        .quiz-question.answered li {
            cursor: default;
            pointer-events: none;
        }

        .quiz-question.answered li:hover {
            transform: none;
            background: white;
        }

        @media (max-width: 1024px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                top: 0;
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
            }
            
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>🎓 Kenostod Academy Courses</h1>
        <p>Your blockchain education journey - 21 courses to master</p>
    </div>

    <div class="sidebar">
        <h3>Blockchain Courses (1-16)</h3>
        <ul class="course-nav" id="blockchain-courses">
            <!-- Populated by JavaScript -->
        </ul>

        <div class="financial-literacy">
            <h3>Financial Literacy (17-21)</h3>
            <ul class="course-nav" id="finance-courses">
                <!-- Populated by JavaScript -->
            </ul>
        </div>

        <div id="graduate-club-section" style="display: none; margin-top: 32px; padding-top: 24px; border-top: 2px solid #e5e7eb;">
            <h3 style="color: #059669; margin-bottom: 12px;">🎓 GRADUATE CLUB</h3>
            <button id="graduate-btn" style="width: 100%; background: linear-gradient(135deg, #059669, #047857); color: white; padding: 12px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: all 0.2s; margin-bottom: 8px;" onclick="loadGraduateClub()">
                🎓 Graduate Club
            </button>
            <button onclick="window.location.href='/admin-grants.html'" style="width: 100%; background: linear-gradient(135deg, var(--primary-blue), var(--primary-dark)); color: white; padding: 12px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.9rem;">
                💎 Manage Grants
            </button>
        </div>

        <div class="admin-only-section" style="margin-top: 24px; padding-top: 24px; border-top: 2px solid #e5e7eb;">
            <h3 style="color: #667eea; margin-bottom: 12px;">🌟 ADMIN PORTAL</h3>
            <button onclick="window.location.href='/admin-backoffice.html'" style="width: 100%; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 12px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: all 0.2s; margin-bottom: 8px;">
                🎛️ Full Admin Dashboard
            </button>
        </div>

        <div style="margin-top: 24px; padding-top: 24px; border-top: 2px solid #e5e7eb;">
            <button id="admin-toggle-btn" onclick="handleAdminToggle()" style="width: 100%; padding: 10px 16px; border: 2px solid #667eea; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s; background: white; color: #667eea;">
                🔑 Admin Login
            </button>
        </div>
        <script>
        function handleAdminToggle() {
            if (localStorage.getItem('kenostodAdmin') === 'true') {
                localStorage.removeItem('kenostodAdmin');
                window.location.reload();
            } else {
                showAdminLogin();
            }
        }
        (function updateAdminBtn() {
            const btn = document.getElementById('admin-toggle-btn');
            if (btn && localStorage.getItem('kenostodAdmin') === 'true') {
                btn.textContent = '🔓 Logged in as Admin — Log Out';
                btn.style.background = '#059669';
                btn.style.color = 'white';
                btn.style.borderColor = '#059669';
            }
        })();
        </script>
    </div>

    <div class="container">
        <div class="main-content" id="course-content">
            <!-- Course content populated by JavaScript -->
        </div>
    </div>

    <div id="admin-login-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.92); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:white; padding:40px; border-radius:20px; max-width:400px; width:90%; text-align:center; box-shadow:0 25px 50px rgba(0,0,0,0.25);">
            <h2 style="color:#4f6ef7; margin-bottom:8px;">Admin Access</h2>
            <p style="color:#64748b; margin-bottom:24px; font-size:0.9rem;">Enter your admin password to unlock all premium content</p>
            <input type="password" id="admin-pwd-input" placeholder="Admin Password" style="width:100%; padding:12px 16px; border:2px solid #e5e7eb; border-radius:10px; margin-bottom:16px; font-size:1rem; box-sizing:border-box;">
            <div id="admin-login-error" style="color:#ef4444; margin-bottom:12px; display:none; font-size:0.85rem;"></div>
            <button onclick="doAdminLogin()" style="width:100%; padding:12px; background:linear-gradient(135deg,#4f6ef7,#3b5de7); color:white; border:none; border-radius:10px; font-weight:700; cursor:pointer; font-size:1rem; margin-bottom:8px;">Unlock All Content</button>
            <button onclick="closeAdminLogin()" style="width:100%; padding:10px; background:#f1f5f9; color:#64748b; border:none; border-radius:10px; cursor:pointer; font-size:0.9rem;">Cancel</button>
        </div>
    </div>

    <script>
    function showAdminLogin() {
        const modal = document.getElementById('admin-login-modal');
        modal.style.display = 'flex';
        document.getElementById('admin-pwd-input').focus();
    }
    function closeAdminLogin() {
        document.getElementById('admin-login-modal').style.display = 'none';
        document.getElementById('admin-login-error').style.display = 'none';
        document.getElementById('admin-pwd-input').value = '';
    }
    async function doAdminLogin() {
        const pwd = document.getElementById('admin-pwd-input').value;
        if (!pwd) return;
        try {
            const resp = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pwd })
            });
            const data = await resp.json();
            if (data.success) {
                localStorage.setItem('kenostodAdmin', 'true');
                closeAdminLogin();
                window.location.reload();
            } else {
                const err = document.getElementById('admin-login-error');
                err.textContent = 'Incorrect password. Please try again.';
                err.style.display = 'block';
            }
        } catch (e) {
            const err = document.getElementById('admin-login-error');
            err.textContent = 'Connection error. Please try again.';
            err.style.display = 'block';
        }
    }
    document.getElementById('admin-pwd-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') doAdminLogin();
    });
    </script>

    <script src="/backoffice.js"></script>
</body>
</html>
