<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graduate Merchandise Orders - Admin Panel</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="stylesheet" href="/style.css">
    <style>
        .admin-hero {
            background: linear-gradient(135deg, #064e3b 0%, #059669 100%);
            padding: 40px 20px;
            color: white;
        }

        .admin-hero h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-md);
            border-left: 5px solid var(--primary-emerald);
        }

        .stat-card .label {
            font-size: 0.9rem;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .filters {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid var(--bg-gray);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .filter-btn:hover {
            border-color: var(--primary-emerald);
        }

        .filter-btn.active {
            background: var(--primary-emerald);
            color: white;
            border-color: var(--primary-emerald);
        }

        .orders-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--primary-emerald);
            color: white;
            padding: 16px;
            text-align: left;
            font-weight: 700;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--bg-gray);
        }

        tr:hover {
            background: #f0fdf4;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-processing {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-shipped {
            background: #dcfce7;
            color: #166534;
        }

        .status-delivered {
            background: #e0e7ff;
            color: #4338ca;
        }

        .btn-view {
            background: var(--primary-emerald);
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-view:hover {
            background: #059669;
        }

        .btn-export {
            background: var(--accent-gold);
            color: var(--text-dark);
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-export:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            max-width: 700px;
            margin: 40px auto;
            border-radius: 20px;
            padding: 40px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-gray);
        }

        .modal-close:hover {
            color: var(--text-dark);
        }

        .detail-group {
            margin-bottom: 24px;
        }

        .detail-group h4 {
            color: var(--primary-emerald);
            font-size: 1.2rem;
            margin-bottom: 12px;
        }

        .detail-row {
            display: grid;
            grid-template-columns: 140px 1fr;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .detail-row .label {
            font-weight: 600;
            color: var(--text-gray);
        }

        .detail-row .value {
            color: var(--text-dark);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--bg-gray);
            border-radius: 8px;
            font-size: 1rem;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .orders-table {
                overflow-x: auto;
            }

            .detail-row {
                grid-template-columns: 1fr;
                gap: 4px;
            }
        }
    </style>
</head>
<body>
    <nav class="professional-nav">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <img src="/logo.png" alt="Kenostod Shield" style="width: 48px; height: 48px;">
                <div class="logo-text">
                    <div class="logo-title">Kenostod</div>
                    <div class="logo-subtitle">Admin Panel</div>
                </div>
            </a>
            <button class="nav-cta btn-gold" onclick="window.location.href='/backoffice.html'">Back Office</button>
        </div>
    </nav>

    <div class="admin-hero">
        <div class="container">
            <h1>📦 Graduate Merchandise Orders</h1>
            <p>Manage and fulfill graduate merchandise requests</p>
        </div>
    </div>

    <div class="admin-container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total Orders</div>
                <div class="value" id="stat-total">0</div>
            </div>
            <div class="stat-card" style="border-left-color: #f59e0b;">
                <div class="label">Pending</div>
                <div class="value" id="stat-pending">0</div>
            </div>
            <div class="stat-card" style="border-left-color: #3b82f6;">
                <div class="label">Processing</div>
                <div class="value" id="stat-processing">0</div>
            </div>
            <div class="stat-card" style="border-left-color: #10b981;">
                <div class="label">Shipped</div>
                <div class="value" id="stat-shipped">0</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterOrders('all')">All Orders</button>
            <button class="filter-btn" onclick="filterOrders('pending')">Pending</button>
            <button class="filter-btn" onclick="filterOrders('processing')">Processing</button>
            <button class="filter-btn" onclick="filterOrders('shipped')">Shipped</button>
            <button class="filter-btn" onclick="filterOrders('delivered')">Delivered</button>
            <div style="flex: 1;"></div>
            <label style="display: flex; align-items: center; gap: 8px; margin-right: 16px; cursor: pointer;" title="Graduates receive emails when orders ship/deliver">
                <input type="checkbox" id="emailNotificationsToggle" checked onchange="saveEmailPreference()">
                <span style="font-size: 0.9rem;">📧 Send email notifications</span>
            </label>
            <button class="btn-export" onclick="exportToCSV()">📥 Export to CSV</button>
        </div>

        <div class="orders-table">
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Graduate</th>
                        <th>Items</th>
                        <th>Cost</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px; color: #666;">
                            Loading orders...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="orderModal" class="modal" onclick="if(event.target===this) closeModal()">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 style="color: var(--primary-emerald); margin-bottom: 24px;">Order Details</h2>
            
            <div id="orderDetails"></div>

            <div style="border-top: 2px solid var(--bg-gray); margin-top: 32px; padding-top: 32px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="color: var(--text-dark); margin: 0;">Update Order Status</h3>
                    <button id="sendToPrintfulBtn" class="btn-view" style="background: #7c3aed; display: none;" onclick="sendToPrintful()">
                        🖨️ Send to Printful
                    </button>
                </div>

                <div class="form-group">
                    <label for="updateStatus">Status</label>
                    <select id="updateStatus">
                        <option value="pending">Pending</option>
                        <option value="processing">Processing</option>
                        <option value="shipped">Shipped</option>
                        <option value="delivered">Delivered</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="trackingNumber">Tracking Number</label>
                    <input type="text" id="trackingNumber" placeholder="e.g. 1Z999AA10123456784">
                </div>

                <div class="form-group">
                    <label for="printfulOrderId">Printful Order ID</label>
                    <input type="text" id="printfulOrderId" placeholder="e.g. 12345678">
                </div>

                <div class="form-group">
                    <label for="orderNotes">Order Notes</label>
                    <textarea id="orderNotes" placeholder="Internal notes about this order..."></textarea>
                </div>

                <div style="text-align: center;">
                    <button class="btn-view" style="padding: 12px 32px; font-size: 1rem;" onclick="updateOrderStatus()">
                        Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allOrders = [];
        let currentFilter = 'all';
        let currentOrderId = null;
        let adminKey = null;
        let adminWallet = null;

        function checkAdminAuth() {
            adminKey = localStorage.getItem('adminKey');
            adminWallet = localStorage.getItem('adminWallet');
            
            if (!adminKey && !adminWallet) {
                const key = prompt('🔒 Admin Authentication Required\n\nPlease enter your admin key or leave blank to use wallet address:');
                
                if (!key) {
                    const wallet = prompt('Enter your admin wallet address (0x...):');
                    if (!wallet || !wallet.startsWith('0x')) {
                        alert('Invalid admin credentials. Access denied.');
                        window.location.href = '/backoffice.html';
                        return false;
                    }
                    adminWallet = wallet;
                    localStorage.setItem('adminWallet', wallet);
                } else {
                    adminKey = key;
                    localStorage.setItem('adminKey', key);
                }
            }
            
            return true;
        }

        function getAdminHeaders() {
            const headers = {
                'Content-Type': 'application/json'
            };
            
            if (adminKey) {
                headers['X-Admin-Key'] = adminKey;
            } else if (adminWallet) {
                headers['X-Admin-Wallet'] = adminWallet;
            }
            
            return headers;
        }

        function handleAuthError() {
            alert('⚠️ Admin authentication failed. Please re-enter your credentials.');
            localStorage.removeItem('adminKey');
            localStorage.removeItem('adminWallet');
            adminKey = null;
            adminWallet = null;
            window.location.reload();
        }

        async function loadOrders() {
            try {
                const response = await fetch('/api/graduate/merchandise/orders', {
                    headers: getAdminHeaders()
                });
                const data = await response.json();
                
                if (response.status === 403 || response.status === 401) {
                    handleAuthError();
                    return;
                }
                
                if (data.success) {
                    allOrders = data.orders;
                    updateStats();
                    renderOrders();
                }
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('ordersTableBody').innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px; color: #dc2626;">
                            Error loading orders. Please refresh the page.
                        </td>
                    </tr>
                `;
            }
        }

        function updateStats() {
            const stats = {
                total: allOrders.length,
                pending: allOrders.filter(o => o.order_status === 'pending').length,
                processing: allOrders.filter(o => o.order_status === 'processing').length,
                shipped: allOrders.filter(o => o.order_status === 'shipped').length
            };

            document.getElementById('stat-total').textContent = stats.total;
            document.getElementById('stat-pending').textContent = stats.pending;
            document.getElementById('stat-processing').textContent = stats.processing;
            document.getElementById('stat-shipped').textContent = stats.shipped;
        }

        function filterOrders(status) {
            currentFilter = status;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderOrders();
        }

        function renderOrders() {
            const tbody = document.getElementById('ordersTableBody');
            
            let filtered = currentFilter === 'all' 
                ? allOrders 
                : allOrders.filter(o => o.order_status === currentFilter);

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px; color: #666;">
                            No orders found.
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = filtered.map(order => {
                const items = JSON.parse(order.items_requested);
                const itemCount = items.reduce((sum, item) => sum + item.quantity, 0);
                const cost = parseFloat(order.estimated_total_cost || 0);
                const date = new Date(order.created_at).toLocaleDateString();

                return `
                    <tr>
                        <td><strong>${order.order_id}</strong></td>
                        <td>
                            ${order.graduate_name}<br>
                            <small style="color: #666;">${order.graduate_id}</small>
                        </td>
                        <td>${itemCount} item(s)</td>
                        <td>${cost === 0 ? 'FREE' : `$${cost.toFixed(2)}`}</td>
                        <td><span class="status-badge status-${order.order_status}">${order.order_status.toUpperCase()}</span></td>
                        <td>${date}</td>
                        <td>
                            <button class="btn-view" onclick="viewOrder('${order.order_id}')">View</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function viewOrder(orderId) {
            currentOrderId = orderId;
            const order = allOrders.find(o => o.order_id === orderId);
            if (!order) return;

            const items = JSON.parse(order.items_requested);
            
            let itemsHTML = items.map(item => {
                const price = item.price === 0 ? 'FREE' : `$${item.price}`;
                const total = item.price * item.quantity;
                const totalDisplay = total === 0 ? 'FREE' : `$${total.toFixed(2)}`;
                return `
                    <div class="detail-row">
                        <div class="label">${item.itemType.replace(/_/g, ' ').toUpperCase()}</div>
                        <div class="value">Qty: ${item.quantity} × ${price} = ${totalDisplay}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('orderDetails').innerHTML = `
                <div class="detail-group">
                    <h4>📋 Order Information</h4>
                    <div class="detail-row">
                        <div class="label">Order ID:</div>
                        <div class="value">${order.order_id}</div>
                    </div>
                    <div class="detail-row">
                        <div class="label">Graduate ID:</div>
                        <div class="value">${order.graduate_id}</div>
                    </div>
                    <div class="detail-row">
                        <div class="label">Status:</div>
                        <div class="value"><span class="status-badge status-${order.order_status}">${order.order_status.toUpperCase()}</span></div>
                    </div>
                    <div class="detail-row">
                        <div class="label">Order Date:</div>
                        <div class="value">${new Date(order.created_at).toLocaleString()}</div>
                    </div>
                </div>

                <div class="detail-group">
                    <h4>👤 Customer Information</h4>
                    <div class="detail-row">
                        <div class="label">Name:</div>
                        <div class="value">${order.graduate_name}</div>
                    </div>
                    <div class="detail-row">
                        <div class="label">Email:</div>
                        <div class="value">${order.user_email || 'N/A'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="label">Phone:</div>
                        <div class="value">${order.phone_number || 'N/A'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="label">Wallet:</div>
                        <div class="value" style="font-size: 0.85rem; word-break: break-all;">${order.user_wallet_address}</div>
                    </div>
                </div>

                <div class="detail-group">
                    <h4>📍 Shipping Address</h4>
                    <div class="detail-row">
                        <div class="label">Address:</div>
                        <div class="value">
                            ${order.shipping_address_line1}<br>
                            ${order.shipping_address_line2 ? order.shipping_address_line2 + '<br>' : ''}
                            ${order.shipping_city}, ${order.shipping_state || ''} ${order.shipping_postal_code}<br>
                            ${order.shipping_country}
                        </div>
                    </div>
                </div>

                <div class="detail-group">
                    <h4>🛍️ Items Requested</h4>
                    ${itemsHTML}
                    <div class="detail-row" style="margin-top: 12px; padding-top: 12px; border-top: 2px solid #e5e7eb;">
                        <div class="label" style="font-weight: 800;">Total:</div>
                        <div class="value" style="font-weight: 800; color: var(--primary-emerald);">
                            ${order.estimated_total_cost == 0 ? 'FREE' : `$${parseFloat(order.estimated_total_cost).toFixed(2)}`}
                        </div>
                    </div>
                </div>

                ${order.tracking_number ? `
                    <div class="detail-group">
                        <h4>📦 Shipping Information</h4>
                        <div class="detail-row">
                            <div class="label">Tracking:</div>
                            <div class="value">${order.tracking_number}</div>
                        </div>
                    </div>
                ` : ''}

                ${order.order_notes ? `
                    <div class="detail-group">
                        <h4>📝 Order Notes</h4>
                        <div class="detail-row">
                            <div class="value">${order.order_notes}</div>
                        </div>
                    </div>
                ` : ''}
            `;

            document.getElementById('updateStatus').value = order.order_status;
            document.getElementById('trackingNumber').value = order.tracking_number || '';
            document.getElementById('printfulOrderId').value = order.printful_order_id || '';
            document.getElementById('orderNotes').value = order.order_notes || '';

            const sendToPrintfulBtn = document.getElementById('sendToPrintfulBtn');
            if (!order.printful_order_id && (order.order_status === 'pending' || order.order_status === 'processing')) {
                sendToPrintfulBtn.style.display = 'block';
            } else {
                sendToPrintfulBtn.style.display = 'none';
            }

            document.getElementById('orderModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
            currentOrderId = null;
        }

        async function updateOrderStatus() {
            if (!currentOrderId) return;

            const status = document.getElementById('updateStatus').value;
            const trackingNumber = document.getElementById('trackingNumber').value.trim();
            const printfulOrderId = document.getElementById('printfulOrderId').value.trim();
            const orderNotes = document.getElementById('orderNotes').value.trim();

            try {
                const response = await fetch(`/api/graduate/merchandise/orders/${currentOrderId}`, {
                    method: 'PUT',
                    headers: getAdminHeaders(),
                    body: JSON.stringify({
                        status,
                        trackingNumber: trackingNumber || undefined,
                        printfulOrderId: printfulOrderId || undefined,
                        orderNotes: orderNotes || undefined
                    })
                });

                const result = await response.json();

                if (response.status === 403 || response.status === 401) {
                    handleAuthError();
                    return;
                }

                if (result.success) {
                    alert('✅ Order updated successfully!');
                    closeModal();
                    loadOrders();
                } else {
                    alert(`❌ Error: ${result.error}`);
                }
            } catch (error) {
                console.error('Error updating order:', error);
                alert('❌ Failed to update order. Please try again.');
            }
        }

        async function sendToPrintful() {
            if (!currentOrderId) return;

            const confirmSend = confirm('🖨️ Send this order to Printful for fulfillment?\n\nThis will:\n- Create a Printful order\n- Update status to "processing"\n- Begin the fulfillment process');
            
            if (!confirmSend) return;

            try {
                const response = await fetch(`/api/graduate/merchandise/orders/${currentOrderId}/send-to-printful`, {
                    method: 'POST',
                    headers: getAdminHeaders()
                });

                const result = await response.json();

                if (response.status === 403 || response.status === 401) {
                    handleAuthError();
                    return;
                }

                if (result.success) {
                    alert(`✅ Order sent to Printful successfully!\n\nPrintful Order ID: ${result.printfulOrderId}\nEstimated Ship Date: ${result.estimatedShippingDate || 'TBD'}`);
                    closeModal();
                    loadOrders();
                } else {
                    alert(`❌ Error: ${result.error}`);
                }
            } catch (error) {
                console.error('Error sending to Printful:', error);
                alert('❌ Failed to send order to Printful. Please try again.');
            }
        }

        function saveEmailPreference() {
            const toggle = document.getElementById('emailNotificationsToggle');
            localStorage.setItem('emailNotificationsEnabled', toggle.checked);
            console.log(`📧 Email notifications ${toggle.checked ? 'enabled' : 'disabled'}`);
        }

        function loadEmailPreference() {
            const saved = localStorage.getItem('emailNotificationsEnabled');
            const toggle = document.getElementById('emailNotificationsToggle');
            
            if (saved !== null) {
                toggle.checked = saved === 'true';
            } else {
                toggle.checked = true;
            }
        }

        function exportToCSV() {
            if (allOrders.length === 0) {
                alert('No orders to export');
                return;
            }

            const headers = ['Order ID', 'Graduate ID', 'Name', 'Email', 'Phone', 'Address', 'City', 'State', 'Postal Code', 'Country', 'Items', 'Total Cost', 'Status', 'Tracking', 'Order Date'];
            
            const rows = allOrders.map(order => {
                const items = JSON.parse(order.items_requested);
                const itemsSummary = items.map(i => `${i.itemType}(${i.quantity})`).join('; ');
                const address = `${order.shipping_address_line1}${order.shipping_address_line2 ? ' ' + order.shipping_address_line2 : ''}`;

                return [
                    order.order_id,
                    order.graduate_id,
                    order.graduate_name,
                    order.user_email || '',
                    order.phone_number || '',
                    address,
                    order.shipping_city,
                    order.shipping_state || '',
                    order.shipping_postal_code,
                    order.shipping_country,
                    itemsSummary,
                    order.estimated_total_cost || 0,
                    order.order_status,
                    order.tracking_number || '',
                    new Date(order.created_at).toLocaleDateString()
                ];
            });

            const csv = [headers, ...rows].map(row => 
                row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
            ).join('\n');

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `merchandise-orders-${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        window.addEventListener('load', () => {
            if (checkAdminAuth()) {
                loadEmailPreference();
                loadOrders();
            }
        });

        setInterval(loadOrders, 30000);
    </script>
    <script src="/custom-dialogs.js"></script>
</body>
</html>
